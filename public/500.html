<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Erro no Servidor (500) - Mãos que Ensinam</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { background-color: #f3f4f6; color: #1f2937; text-align: center; font-family: 'Inter', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .dialog { background: white; padding: 3rem 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); max-width: 400px; width: 90%; border-top: 4px solid #ef4444; }
    h1 { font-size: 3rem; color: #ef4444; margin-bottom: 0.5rem; margin-top: 0; }
    h2 { font-size: 1.25rem; color: #374151; margin-bottom: 1rem; }
    p { margin-bottom: 2rem; color: #6b7280; line-height: 1.5; }
    a { display: inline-block; padding: 0.75rem 1.5rem; background-color: #3b82f6; color: white; text-decoration: none; border-radius: 9999px; font-weight: 600; transition: background-color 0.2s; }
    a:hover { background-color: #2563eb; }
  </style>
</head>
<body>
  <div class="dialog">
    <h1>500</h1>
    <h2>Erro Interno do Servidor</h2>
    <p>Desculpe, nossa equipe técnica esbarrou em um problema ao processar sua requisição. Já fomos notificados!</p>
    <a href="/">Voltar para a Home</a>
  </div>
</body>
</html>
